name = "visibility-marketing"
main = "dist/index.js"
compatibility_date = "2024-09-23"

# ─── D1 Database (marketing-specific) ────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "visibility-marketing-db"
database_id = "00bb447b-f813-4f00-929b-b709f64f8872"
migrations_dir = "migrations"

# ─── KV Namespace (campaign tracking, drip sequences, affiliate data) ────────
[[kv_namespaces]]
binding = "KV_MARKETING"
id = "8fae6d27403d4ca5be5f901097464901"

# ─── R2 Bucket (email templates, marketing assets — optional) ────────────────
# [[r2_buckets]]
# binding = "R2_ASSETS"
# bucket_name = "marketing-assets"

# ─── Service Binding to visibility-analytics ─────────────────────────────────
[[services]]
binding = "ANALYTICS"
service = "visibility-analytics"

# ─── Cron Triggers (process due email sends every 5 minutes) ─────────────────
[triggers]
crons = ["*/5 * * * *"]

# ─── Environment Variables ───────────────────────────────────────────────────
[vars]
FROM_EMAIL = "product@clodo.dev"
FROM_NAME = "Clodo SEO"
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://visibility.clodo.dev"
PAYOUT_PROVIDER = "stub"

# Secrets (set via `wrangler secret put`):
#   ADMIN_TOKEN
#   EMAIL_API_KEY
#   EMAIL_PROVIDER        (brevo | sendgrid)
#   SLACK_WEBHOOK_URL
#   DISCORD_WEBHOOK_URL

# ─── Dev Environment ────────────────────────────────────────────────────────
[env.development]
name = "visibility-marketing-dev"
vars = { ENVIRONMENT = "development", FROM_EMAIL = "dev@clodo.dev", FROM_NAME = "Clodo SEO (Dev)" }

# ─── Build Configuration ────────────────────────────────────────────────────
[build]
command = "pnpm run build"
cwd = "."

# ─── Observability ──────────────────────────────────────────────────────────
[observability]
enabled = true
