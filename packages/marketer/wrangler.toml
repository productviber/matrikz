name = "visibility-marketing"
main = "dist/index.js"
compatibility_date = "2024-09-23"

# ─── D1 Database (marketing-specific) ────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "visibility-marketing-db"
database_id = "00bb447b-f813-4f00-929b-b709f64f8872"
migrations_dir = "migrations"

# ─── KV Namespace (campaign tracking, drip sequences, affiliate data) ────────
[[kv_namespaces]]
binding = "KV_MARKETING"
id = "8fae6d27403d4ca5be5f901097464901"

# ─── R2 Bucket (email templates, marketing assets — optional) ────────────────
# [[r2_buckets]]
# binding = "R2_ASSETS"
# bucket_name = "marketing-assets"

# ─── Service Binding to visibility-analytics ─────────────────────────────────
[[services]]
binding = "ANALYTICS"
service = "visibility-analytics"

# Optional advisory binding. Enable after deploying growth-agent with matching
# internal growth capabilities; code falls back safely when absent.
[[services]]
binding = "AI_ENGINE"
service = "growth-agent"

# ─── Service Binding to Skrip messaging platform ─────────────────────────────
# Enables Worker-to-Worker calls without going through the public internet
# (avoids Cloudflare error 1042 which blocks subrequests to *.workers.dev URLs).
[[services]]
binding = "SKRIP_SERVICE"
service = "message-manufacturer-platform"

# ─── Cron Triggers (process due email sends every 5 minutes) ─────────────────
[triggers]
crons = ["*/5 * * * *"]

# ─── Environment Variables ───────────────────────────────────────────────────
[vars]
EMAIL_PROVIDER = "brevo"
FROM_EMAIL = "product@clodo.dev"
FROM_NAME = "Alex from AXEO"
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://visibility.clodo.dev"
PAYOUT_PROVIDER = "stub"
GROWTH_AGENT_TIMEOUT_MS = "12000"
# When using PAYOUT_PROVIDER = "razorpay", also set:
#   RAZORPAY_ACCOUNT_NUMBER = "your-razorpay-account-number"  (plain var — not secret)

# Secrets (set via `wrangler secret put`):
#   ADMIN_TOKEN
#   ADMIN_TOKEN_ROLLOVER
#   SYSTEM_TOKEN
#   SYSTEM_TOKEN_ROLLOVER
#   AGENT_TOKEN
#   AGENT_TOKEN_ROLLOVER
#   WEBHOOK_TOKEN
#   WEBHOOK_TOKEN_ROLLOVER
#   AFFILIATE_AUTH_SECRET
#   WEBHOOK_SIGNING_SECRET
#   SKRIP_BASE_URL
#   EMAIL_API_KEY
#   SKRIP_SERVICE_TOKEN
#   SLACK_WEBHOOK_URL
#   DISCORD_WEBHOOK_URL
#
# Payout provider secrets (only required for the selected PAYOUT_PROVIDER):
#   RAZORPAY_KEY_ID               Razorpay X2B key ID (for PAYOUT_PROVIDER=razorpay)
#   RAZORPAY_KEY_SECRET           Razorpay X2B key secret
#   STRIPE_SECRET_KEY             Stripe secret key sk_live_... (for PAYOUT_PROVIDER=stripe)

# ─── Dev Environment ────────────────────────────────────────────────────────
[env.development]
name = "visibility-marketing-dev"

[env.development.vars]
ENVIRONMENT = "development"
FROM_EMAIL = "product@clodo.dev"
FROM_NAME = "AXEO (Dev)"
EMAIL_PROVIDER = "brevo"
ALLOWED_ORIGIN = "https://visibility.clodo.dev"
PAYOUT_PROVIDER = "stub"
GROWTH_AGENT_TIMEOUT_MS = "12000"

[[env.development.kv_namespaces]]
binding = "KV_MARKETING"
id = "8fae6d27403d4ca5be5f901097464901"

[[env.development.d1_databases]]
binding = "DB"
database_name = "visibility-marketing-db"
database_id = "00bb447b-f813-4f00-929b-b709f64f8872"
migrations_dir = "migrations"

[[env.development.services]]
binding = "ANALYTICS"
service = "visibility-analytics"

[[env.development.services]]
binding = "AI_ENGINE"
service = "growth-agent"

[[env.development.services]]
binding = "SKRIP_SERVICE"
service = "message-manufacturer-platform"

# ─── Build Configuration ────────────────────────────────────────────────────
[build]
command = "npx vite build"
cwd = "."

# ─── Observability ──────────────────────────────────────────────────────────
[observability]
enabled = true
