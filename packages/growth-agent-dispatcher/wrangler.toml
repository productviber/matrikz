name = "growth-agent-dispatcher"
main = "src/index.ts"
compatibility_date = "2026-05-03"

[vars]
ENVIRONMENT = "production"
VISIBILITY_MARKETING_URL = ""

[[queues.consumers]]
queue = "growth-agent-recommendations"
max_batch_size = 20
max_batch_timeout = 10
max_retries = 3

[[queues.producers]]
binding = "DISPATCH_DLQ"
queue = "growth-agent-dispatch-dlq"

[[d1_databases]]
binding = "OUTCOME_DB"
database_name = "growth-agent-outcome-db"
database_id = "replace-with-outcome-db-id"

