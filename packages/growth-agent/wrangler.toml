name = "growth-agent"
main = "src/index.ts"
compatibility_date = "2026-05-03"

[triggers]
crons = ["0 * * * *"]

[vars]
APP_VERSION = "0.1.0"
RESPONSE_SCHEMA_VERSION = "1.0.0"
REQUEST_SCHEMA_VERSION = "1.0.0"
ENVIRONMENT = "production"
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
AI_TIMEOUT_MS = "3500"
AI_MAX_RETRIES = "1"
AI_OUTPUT_REPAIR_ATTEMPTS = "1"
SECONDARY_LLM_PROVIDER_URL = ""
BUDGET_PER_TENANT_PER_MIN = "120"
RATE_LIMIT_PER_TENANT_CAPABILITY_PER_MIN = "180"
INTERNAL_SECRET_ROTATION_WINDOW_HOURS = "24"
PROACTIVE_SCAN_ENABLED = "false"
PROACTIVE_SCAN_COOLDOWN_HOURS = "24"
PRIOR_TTL_DAYS = "30"
CALIBRATION_RECALC_AFTER_N = "10"
OUTCOME_RETENTION_DAYS = "90"
# All capabilities off by default — enable per-environment after deployment validation
CAPABILITY_GROWTH_NEXT_ACTION_ENABLED = "false"
CAPABILITY_GROWTH_SIGNAL_SUMMARIZE_ENABLED = "false"
CAPABILITY_JOURNEY_CRITIC_ENABLED = "false"
CAPABILITY_MESSAGE_BRIEF_ENABLED = "false"
CAPABILITY_OUTCOME_DIAGNOSE_ENABLED = "false"
CAPABILITY_OUTCOME_FEEDBACK_ENABLED = "false"
CAPABILITY_PROACTIVE_SCAN_ENABLED = "false"

[ai]
binding = "WORKERS_AI"

[[kv_namespaces]]
binding = "TENANT_PRIOR_KV"
id = "replace-with-tenant-prior-kv-id"

[[kv_namespaces]]
binding = "TENANT_REGISTRY_KV"
id = "replace-with-tenant-registry-kv-id"

[[d1_databases]]
binding = "OUTCOME_DB"
database_name = "growth-agent-outcome-db"
database_id = "replace-with-outcome-db-id"

[[queues.producers]]
binding = "RECOMMENDATION_QUEUE"
queue = "growth-agent-recommendations"

[env.development.vars]
APP_VERSION = "0.1.0"
RESPONSE_SCHEMA_VERSION = "1.0.0"
REQUEST_SCHEMA_VERSION = "1.0.0"
ENVIRONMENT = "development"
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
AI_TIMEOUT_MS = "3500"
AI_MAX_RETRIES = "1"
AI_OUTPUT_REPAIR_ATTEMPTS = "1"
SECONDARY_LLM_PROVIDER_URL = ""
BUDGET_PER_TENANT_PER_MIN = "120"
RATE_LIMIT_PER_TENANT_CAPABILITY_PER_MIN = "180"
INTERNAL_SECRET_ROTATION_WINDOW_HOURS = "24"
PROACTIVE_SCAN_ENABLED = "true"
PROACTIVE_SCAN_COOLDOWN_HOURS = "24"
PRIOR_TTL_DAYS = "30"
CALIBRATION_RECALC_AFTER_N = "10"
OUTCOME_RETENTION_DAYS = "90"
CAPABILITY_GROWTH_NEXT_ACTION_ENABLED = "true"
CAPABILITY_GROWTH_SIGNAL_SUMMARIZE_ENABLED = "true"
CAPABILITY_JOURNEY_CRITIC_ENABLED = "true"
CAPABILITY_MESSAGE_BRIEF_ENABLED = "true"
CAPABILITY_OUTCOME_DIAGNOSE_ENABLED = "true"

[env.staging]
name = "growth-agent-staging"

[env.staging.ai]
binding = "WORKERS_AI"

[env.staging.vars]
APP_VERSION = "0.1.0"
RESPONSE_SCHEMA_VERSION = "1.0.0"
REQUEST_SCHEMA_VERSION = "1.0.0"
ENVIRONMENT = "staging"
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
AI_TIMEOUT_MS = "3500"
AI_MAX_RETRIES = "1"
AI_OUTPUT_REPAIR_ATTEMPTS = "1"
FEATURE_FLAGS_JSON = "{\"growth-next-action\":true,\"growth-signal-summarize\":true,\"journey-critic\":true,\"message-brief\":true,\"outcome-diagnose\":true}"
BUDGET_PER_TENANT_PER_MIN = "120"
RATE_LIMIT_PER_TENANT_CAPABILITY_PER_MIN = "180"
INTERNAL_SECRET_ROTATION_WINDOW_HOURS = "24"
CAPABILITY_GROWTH_NEXT_ACTION_ENABLED = "true"
CAPABILITY_GROWTH_SIGNAL_SUMMARIZE_ENABLED = "true"
CAPABILITY_JOURNEY_CRITIC_ENABLED = "true"
CAPABILITY_MESSAGE_BRIEF_ENABLED = "true"
CAPABILITY_OUTCOME_DIAGNOSE_ENABLED = "true"

[env.production]
name = "growth-agent-production"

[env.production.ai]
binding = "WORKERS_AI"

[env.production.vars]
APP_VERSION = "0.1.0"
RESPONSE_SCHEMA_VERSION = "1.0.0"
REQUEST_SCHEMA_VERSION = "1.0.0"
ENVIRONMENT = "production"
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
AI_TIMEOUT_MS = "3500"
AI_MAX_RETRIES = "1"
AI_OUTPUT_REPAIR_ATTEMPTS = "1"
FEATURE_FLAGS_JSON = "{\"growth-next-action\":false,\"growth-signal-summarize\":false,\"journey-critic\":false,\"message-brief\":false,\"outcome-diagnose\":false}"
BUDGET_PER_TENANT_PER_MIN = "120"
RATE_LIMIT_PER_TENANT_CAPABILITY_PER_MIN = "180"
INTERNAL_SECRET_ROTATION_WINDOW_HOURS = "24"
CAPABILITY_GROWTH_NEXT_ACTION_ENABLED = "false"
CAPABILITY_GROWTH_SIGNAL_SUMMARIZE_ENABLED = "false"
CAPABILITY_JOURNEY_CRITIC_ENABLED = "false"
CAPABILITY_MESSAGE_BRIEF_ENABLED = "true"
CAPABILITY_OUTCOME_DIAGNOSE_ENABLED = "false"
CAPABILITY_OUTCOME_FEEDBACK_ENABLED = "true"
CAPABILITY_PROACTIVE_SCAN_ENABLED = "true"

[env.development.ai]
binding = "WORKERS_AI"

[[env.development.kv_namespaces]]
binding = "TENANT_PRIOR_KV"
id = "replace-with-dev-tenant-prior-kv-id"

[[env.development.kv_namespaces]]
binding = "TENANT_REGISTRY_KV"
id = "replace-with-dev-tenant-registry-kv-id"

[[env.development.d1_databases]]
binding = "OUTCOME_DB"
database_name = "growth-agent-outcome-db-dev"
database_id = "replace-with-dev-outcome-db-id"

[[env.development.queues.producers]]
binding = "RECOMMENDATION_QUEUE"
queue = "growth-agent-recommendations-dev"
