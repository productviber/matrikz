  <!-- [4] Product Engineering -->
  <rect x="75"  y="850" width="340" height="82" rx="8" fill="#160D02" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="75"  y="850" width="340" height="26" rx="8" fill="#F59E0B" fill-opacity="0.07"/>
