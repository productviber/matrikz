  <rect x="75"  y="755" width="340" height="26" rx="8" fill="#00D4FF" fill-opacity="0.07"/>
  <rect x="75"  y="769" width="340" height="12" fill="#00D4FF" fill-opacity="0.07"/>
  <text x="95" y="773" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700"
