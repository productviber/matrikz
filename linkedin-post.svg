  <text x="805" y="796" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#94A3B8">Clean Schemas · Validated Access</text>
  <text x="805" y="815" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#94A3B8">D1 · Analytics Pipeline · Event Sourcing</text>

