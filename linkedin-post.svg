  <text x="95" y="796" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#94A3B8">SLI/SLO · Circuit Breakers · Event Bus</text>
  <text x="95" y="815" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#94A3B8">Graceful Degradation · Observability</text>

  <!-- [2] Software Engineering -->
  <rect x="430" y="755" width="340" height="82" rx="8" fill="#0D0B28" stroke="#818CF8" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="430" y="755" width="340" height="26" rx="8" fill="#818CF8" fill-opacity="0.07"/>
  <rect x="430" y="769" width="340" height="12" fill="#818CF8" fill-opacity="0.07"/>
  <text x="450" y="773" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700"
