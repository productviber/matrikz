  <!-- [6] Interaction Engineering -->
  <rect x="785" y="850" width="340" height="82" rx="8" fill="#02101A" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="785" y="850" width="340" height="26" rx="8" fill="#38BDF8" fill-opacity="0.07"/>
  <rect x="785" y="864" width="340" height="12" fill="#38BDF8" fill-opacity="0.07"/>
  <text x="805" y="868" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700"
