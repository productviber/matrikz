  <text x="450" y="796" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#94A3B8">5,485 Tests · DI · Zod Validation</text>
  <text x="450" y="815" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#94A3B8">Type Safety · Clean Architecture</text>

  <!-- [3] Data Engineering -->
  <rect x="785" y="755" width="340" height="82" rx="8" fill="#031108" stroke="#10B981" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="785" y="755" width="340" height="26" rx="8" fill="#10B981" fill-opacity="0.07"/>
  <rect x="785" y="769" width="340" height="12" fill="#10B981" fill-opacity="0.07"/>
  <text x="805" y="773" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700"
