  <text x="95" y="891" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#94A3B8">PLG Stack · Feature Flags · Lifecycle</text>
  <text x="95" y="910" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#94A3B8">Onboarding Flows · Billing Events</text>

  <!-- [5] Infrastructure Engineering -->
  <rect x="430" y="850" width="340" height="82" rx="8" fill="#16020D" stroke="#EC4899" stroke-width="1" stroke-opacity="0.4"/>
