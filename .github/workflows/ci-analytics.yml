name: CI - visibility-analytics

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/analytics/**'
      - '.github/workflows/ci-analytics.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'packages/analytics/**'
      - '.github/workflows/ci-analytics.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  WORKING_DIR: packages/analytics

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .

      - name: Type-check
        run: pnpm run typecheck
        working-directory: ${{ env.WORKING_DIR }}

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .

      - name: Run unit tests
        run: pnpm run test:unit
        working-directory: ${{ env.WORKING_DIR }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .

      - name: Build
        run: pnpm run build
        working-directory: ${{ env.WORKING_DIR }}
