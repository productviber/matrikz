name: CI — visibility-marketing

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/marketer/**'
      - '.github/workflows/ci-marketing.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'packages/marketer/**'
      - '.github/workflows/ci-marketing.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  WORKING_DIR: packages/marketer

jobs:
  # ── Lint & Type-check ────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .

      - name: Type-check
        run: pnpm run typecheck
        working-directory: ${{ env.WORKING_DIR }}

  # ── Unit Tests ───────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .

      - name: Run unit tests
        run: pnpm run test:unit
        working-directory: ${{ env.WORKING_DIR }}

  # ── Integration Tests ───────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .

      - name: Run integration tests
        run: pnpm run test:integration
        working-directory: ${{ env.WORKING_DIR }}

  # ── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .

      - name: Build
        run: pnpm run build
        working-directory: ${{ env.WORKING_DIR }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketer-dist
          path: ${{ env.WORKING_DIR }}/dist/
          retention-days: 7

  # ── Endpoint Smoke Tests (against local dev server) ─────────────────────
  test-endpoints:
    name: Endpoint Smoke Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: marketer-dist
          path: ${{ env.WORKING_DIR }}/dist/

      - name: Apply local D1 migrations
        run: pnpm run db:migrate || true
        working-directory: ${{ env.WORKING_DIR }}

      - name: Start dev server
        run: |
          npx wrangler dev --port 8787 --local &
          echo "Waiting for dev server..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8787/health > /dev/null 2>&1; then
              echo "Server is up!"
              break
            fi
            sleep 2
          done
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ADMIN_TOKEN: ci-test-token
          EMAIL_PROVIDER: brevo
          EMAIL_API_KEY: test-key

      - name: Run endpoint smoke tests
        run: node tests/smoke.mjs
        working-directory: ${{ env.WORKING_DIR }}
        env:
          BASE_URL: http://localhost:8787

  # ── Deploy to Production ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [build, test-endpoints]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    concurrency:
      group: deploy-marketing-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: marketer-dist
          path: ${{ env.WORKING_DIR }}/dist/

      - name: Apply D1 migrations (production)
        run: pnpm run db:migrate:prod
        working-directory: ${{ env.WORKING_DIR }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: pnpm exec wrangler deploy
        working-directory: ${{ env.WORKING_DIR }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy health check
        run: |
          echo "Waiting 10s for worker to propagate..."
          sleep 10
          HEALTH=$(curl -sf https://visibility-marketing.wetechfounders.workers.dev/health || echo '{"ok":false}')
          echo "Health response: $HEALTH"
          echo "$HEALTH" | grep -q '"ok":true' || (echo "Health check failed!" && exit 1)
